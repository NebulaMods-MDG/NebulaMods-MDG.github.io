<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CM2 Cube Generator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #10131a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Top Bar */
        .update-bar {
            width: 100%;
            background: #1d2533;
            padding: 12px;
            text-align: center;
            font-size: 15px;
            border-bottom: 2px solid #2f3d52;
        }

        /* Main */
        .container {
            margin-top: 60px;
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 30px;
            text-shadow: 0 0 12px rgba(0,150,255,.5);
        }

        .back {
            display: inline-block;
            margin-bottom: 25px;
            color: #66aaff;
            text-decoration: none;
            font-size: 18px;
        }

        .back:hover {
            text-decoration: underline;
        }

        .dimensions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .dimensions input {
            width: 100px;
        }

        input,
        textarea {
            width: 100%;
            padding: 14px;
            margin-bottom: 18px;
            border-radius: 10px;
            border: 2px solid #2f3d52;
            background: #1d2533;
            color: white;
            font-size: 16px;
            outline: none;
        }

        input:focus,
        textarea:focus {
            border-color: #2b7cff;
        }

        textarea {
            height: 220px;
            resize: vertical;
        }

        label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            font-size: 17px;
        }

        input[type="checkbox"] {
            width: auto;
            transform: scale(1.2);
        }

        button {
            background: #2b7cff;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 16px 40px;
            font-size: 20px;
            cursor: pointer;
            transition: .25s;
        }

        button:hover {
            background: #5297ff;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(.98);
        }

        #blockIdContainer {
            display: block;
        }

        #saveStringContainer {
            display: none;
        }
    </style>
</head>

<body>

    <div class="update-bar">
        Last Updated: June 26, 2026
    </div>

    <div class="container">

        <a class="back" href="tools.html">← Back</a>

        <h1>CM2 Cube Generator</h1>

        <label>
            <input type="checkbox" id="advanced">
            Advanced
        </label>

        <div class="dimensions">
            <input
                <div class="dimensions">

    <input
        type="number"
        id="width"
        placeholder="Length"
        min="1"
        max="100">

    <input
        type="number"
        id="height"
        placeholder="Width"
        min="1"
        max="100">

    <input
        type="number"
        id="depth"
        placeholder="Height"
        min="1"
        max="100">

</div>

        <div id="blockIdContainer">
            <input
                type="number"
                id="blockId"
                placeholder="Block ID (1-19)"
                min="1"
                max="19">
        </div>

        <div id="saveStringContainer">
            <textarea
                id="saveString"
                placeholder="Paste CM2 save string here..."></textarea>
        </div>

        <button onclick="generateCube()">
            Copy CM2 String
        </button>

    </div>

    <script src="cubegen.js"></script>

</body>
</html>
