<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>

CM2 Image Generator

</title>

<style>

*{

margin:0;
padding:0;

box-sizing:border-box;

font-family:

Arial,
Helvetica,
sans-serif;

}

body{

background:#10131a;

color:white;

display:flex;

flex-direction:column;

align-items:center;

min-height:100vh;

}

.update-bar{

width:100%;

background:#1d2533;

padding:12px;

text-align:center;

font-size:15px;

border-bottom:

2px solid #2f3d52;

}

.container{

margin-top:60px;

width:90%;

max-width:700px;

text-align:center;

}

.back{

display:inline-block;

margin-bottom:25px;

color:#66aaff;

text-decoration:none;

font-size:18px;

}

.back:hover{

text-decoration:underline;

}

h1{

font-size:50px;

margin-bottom:30px;

text-shadow:

0 0 12px

rgba(
0,
150,
255,
.5
);

}

input{

width:100%;

padding:14px;

margin-bottom:18px;

border-radius:10px;

border:

2px solid #2f3d52;

background:#1d2533;

color:white;

font-size:16px;

outline:none;

}

input:focus{

border-color:#2b7cff;

}

button{

background:#2b7cff;

color:white;

border:none;

border-radius:10px;

padding:16px 40px;

font-size:20px;

cursor:pointer;

transition:.25s;

}

button:hover{

background:#5297ff;

transform:scale(1.05);

}

button:active{

transform:scale(.98);

}

canvas{

margin-top:20px;

max-width:100%;

border:

2px solid #2f3d52;

border-radius:10px;

}

</style>

</head>

<body>

<div class="update-bar">

Last Updated:
June 30, 2026

</div>

<div class="container">

<a
class="back"
href="tools.html">

← Back

</a>

<h1>

CM2 Image Generator

</h1>

<input

type="file"

id="imageInput"

accept="image/*">

<button

onclick="generateImage()">

Copy CM2 String

</button>

<canvas
id="preview">

</canvas>

</div>

<script src="imagegen.js"></script>

</body>

</html>
